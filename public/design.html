<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>PromptKit design system</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    max-width: 780px;
    margin: 56px auto 96px;
    padding: 0 24px;
    font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #1f2230;
    background: #fafafa;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #e2e4eb; background: #131318; }
    .meta { color: #8a91a3; border-color: #2a2a30; }
    h1, h2, h3, h4 { color: #f0f1f5; }
    h2 { border-color: #2a2a30; }
    code { background: #2a2a30; color: #e2e4eb; }
    pre { background: #1a1a1f; }
    th, td { border-color: #2a2a30; }
    th { background: #1a1a1f; }
    blockquote { border-color: #2a2a30; color: #8a91a3; }
    a { color: #9bb6ff; }
    hr { border-color: #2a2a30; }
  }
  .meta {
    font-size: 0.82rem;
    color: #8a91a3;
    margin-bottom: 2.5em;
    padding-bottom: 1.2em;
    border-bottom: 1px solid #e0e0e6;
  }
  h1, h2, h3, h4 { font-weight: 700; line-height: 1.2; margin: 1.6em 0 0.5em; }
  h1 { font-size: 2rem; margin-top: 0; }
  h2 { font-size: 1.4rem; border-bottom: 1px solid #e0e0e6; padding-bottom: 0.3em; margin-top: 2em; }
  h3 { font-size: 1.1rem; }
  h4 { font-size: 1rem; }
  p, ul, ol { margin: 0.8em 0; }
  table { border-collapse: collapse; width: 100%; margin: 1em 0; font-size: 0.94em; }
  th, td { border: 1px solid #e0e0e6; padding: 8px 12px; text-align: left; vertical-align: top; }
  th { background: #f4f5f7; font-weight: 600; }
  code {
    background: #f4f5f7;
    padding: 2px 6px;
    border-radius: 3px;
    font: 0.9em "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  pre { background: #f4f5f7; padding: 16px; overflow-x: auto; border-radius: 6px; }
  pre code { background: transparent; padding: 0; }
  blockquote {
    border-left: 3px solid #c0c0c8;
    padding-left: 16px;
    margin: 1em 0;
    color: #5b6170;
  }
  a { color: #1456f0; }
  hr { border: 0; border-top: 1px solid #e0e0e6; margin: 2em 0; }
  .loading { color: #8a91a3; font-style: italic; }
  .error { color: #c0364a; padding: 1em; border: 1px solid #c0364a; border-radius: 6px; }
</style>
</head>
<body>
<div class="meta">PromptKit design source of truth. Renders <code>DESIGN.md</code> from this repo. <a href="https://github.com/bwbcollier-byte/promptkit/blob/main/DESIGN.md">View on GitHub</a></div>
<div id="content" class="loading">Loading design document...</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
fetch('./DESIGN.md')
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(function(md) {
    var el = document.getElementById('content');
    el.className = '';
    el.innerHTML = window.marked ? marked.parse(md) : '<pre>' + md.replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]}) + '</pre>';
  })
  .catch(function(e) {
    var el = document.getElementById('content');
    el.className = 'error';
    el.textContent = 'Could not load DESIGN.md: ' + e.message + '. Try GitHub: https://github.com/bwbcollier-byte/promptkit/blob/main/DESIGN.md';
  });
</script>
</body>
</html>
