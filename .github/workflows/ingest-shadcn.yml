# Ingestion: shadcn
# Cadence: daily 04:23 UTC
# Source spec: docs/planning/specs/vibe-coder-hub-data-sourcing.md
name: ingest-shadcn

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

concurrency:
  group: ingest-shadcn
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      DATABASE_URL_POOLED: ${{ secrets.DATABASE_URL_POOLED }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      GITHUB_INGESTION_TOKEN: ${{ secrets.GITHUB_INGESTION_TOKEN }}
      SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
      AA_API_KEY: ${{ secrets.AA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SLACK_OPS_WEBHOOK_URL: ${{ secrets.SLACK_OPS_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run shadcn ingestion
        run: pnpm tsx scripts/ingest/shadcn.ts

      - name: Notify Slack on failure
        if: failure() && env.SLACK_OPS_WEBHOOK_URL != ''
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\":rotating_light: ingest-shadcn failed — <$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID|run>\"}" \
            "$SLACK_OPS_WEBHOOK_URL"
